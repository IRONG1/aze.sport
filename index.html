<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>阿澤古法健身-健康食譜領取</title>
  <style>
    :root {
      --bg: #fffaf2;
      --soft: #f3eadc;
      --text: #1f241f;
      --subtext: #6f7568;
      --green: #2fb86f;
      --green-deep: #17894f;
      --green-soft: #e7f6ed;
      --accent: #f59e4c;
      --accent-soft: #fff0dc;
      --border: rgba(31, 36, 31, 0.08);
      --shadow: 0 14px 32px rgba(45, 91, 59, 0.12);
      --maxw: 430px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--maxw);
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: relative;
      display: grid;
      grid-template-columns: 44px 1fr 36px;
      align-items: center;
      gap: 10px;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 0;
      z-index: 20;
    }

    .icon-btn {
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .menu-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
    }

    .menu-btn svg {
      width: 23px;
      height: 23px;
      stroke: var(--text);
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 0;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--green-deep);
      letter-spacing: -0.02em;
      user-select: none;
    }

    .brand-mark {
      width: 19px;
      height: 19px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 19px;
      height: 19px;
      object-fit: contain;
      display: block;
    }

    .share-btn {
      width: 44px;
      height: 44px;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }

    .share-btn img {
      width: 23px;
      height: 23px;
      object-fit: contain;
      display: block;
    }

    .drawer {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 66px);
      left: 16px;
      width: 172px;
      background: rgba(255, 250, 242, 0.98);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transform-origin: top left;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      backdrop-filter: blur(14px);
    }

    .drawer.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 12px;
      color: var(--text);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .drawer-item:hover {
      background: #f3eadc;
    }

    .drawer-item:active {
      transform: scale(0.98);
    }

    .drawer-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f3eadc;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .drawer-icon img {
      width: 16px;
      height: 16px;
      display: block;
      object-fit: contain;
    }

    .drawer-item span:last-child {
      font-size: 13px;
      font-weight: 600;
    }

    .hero {
      padding: 42px 22px 18px;
      text-align: center;
      background: var(--bg);
    }

    .avatar {
      width: 124px;
      height: 124px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto;
      box-shadow: 0 12px 30px rgba(45, 91, 59, 0.16);
      background: #e8dfd1;
    }

    .title {
      margin: 22px 0 0;
      font-size: 26px;
      line-height: 1.18;
      font-weight: 500;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .intro-box {
      margin: 20px auto 0;
      max-width: 100%;
      background: linear-gradient(135deg, #f6efe3 0%, #eaf7ee 100%);
      border-radius: 22px;
      padding: 22px 20px;
      font-size: 18px;
      line-height: 1.5;
      color: #586150;
      letter-spacing: -0.02em;
      border: 1px solid rgba(47, 184, 111, 0.08);
    }

    .btn-stack {
      margin-top: 20px;
      display: grid;
      gap: 11px;
    }

    .primary-btn,
    .secondary-btn,
    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 999px;
      letter-spacing: 0;
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      cursor: pointer;
    }

    .primary-btn {
      min-height: 56px;
      background: linear-gradient(180deg, #37c77a 0%, #1f9f5d 100%);
      border: 0;
      box-shadow: 0 10px 22px rgba(31, 159, 93, 0.24);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .secondary-btn {
      min-height: 52px;
      background: #fffaf2;
      border: 1.5px solid rgba(31, 159, 93, 0.38);
      color: var(--green-deep);
      box-shadow: 0 5px 14px rgba(45, 91, 59, 0.07);
      font-size: 15px;
      font-weight: 900;
      font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
    }

    .line-fail-tip {
      margin: -3px 6px 0;
      font-size: 12px;
      line-height: 1.45;
      color: #8a6a42;
      text-align: center;
      font-weight: 600;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .copy-btn:active,
    .link-item:active {
      transform: scale(0.985);
    }

    .line-copy-card {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--green-soft);
      border: 1px solid #cfead8;
      border-radius: 18px;
      box-shadow: 0 10px 22px rgba(47, 184, 111, 0.08);
    }

    .line-copy-main {
      flex: 1;
      min-width: 0;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: #ffffff;
      border: 1px solid rgba(47, 184, 111, 0.26);
      border-radius: 14px;
    }

    .line-copy-icon {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
    }

    .line-copy-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.15;
    }

    .line-copy-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--green-deep);
      text-transform: uppercase;
    }

    .line-copy-id {
      margin-top: 3px;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      word-break: break-all;
    }

    .copy-btn {
      flex: 0 0 auto;
      width: auto;
      min-height: 48px;
      padding: 0 16px;
      border: 0;
      border-radius: 14px;
      background: var(--green-deep);
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 16px rgba(23, 137, 79, 0.16);
    }

    .more-panel {
      margin: 14px -22px 0;
      background: #fffdf8;
      color: var(--text);
      padding: 14px 16px calc(24px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(31, 36, 31, 0.06);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: #48614d;
      letter-spacing: 0.02em;
      text-align: left;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      --c: #333;
      --bg1: #f8f8f8;
      --bg2: #ffffff;
      --bd: #ececec;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 58px;
      padding: 12px 15px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      border: 1.5px solid var(--bd);
      box-shadow: 0 8px 22px rgba(45, 91, 59, 0.06);
      color: var(--text);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(45, 91, 59, 0.11);
    }

    .icon-box {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      overflow: visible;
    }

    .icon-box img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .link-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .link-desc {
      margin-top: 3px;
      font-size: 11px;
      color: #7b7b70;
      line-height: 1.35;
    }

    .arrow {
      flex: 0 0 auto;
      font-size: 18px;
      color: var(--c);
      font-weight: 700;
    }

    .line { --c: #06c755; --bg1: #edf9f1; --bg2: #ffffff; --bd: #c8efd5; }
    .instagram { --c: #d94f84; --bg1: #fff0f6; --bg2: #fff8f2; --bd: #f6ccdd; }
    .facebook { --c: #2f73d9; --bg1: #edf4ff; --bg2: #ffffff; --bd: #cadcff; }
    .youtube { --c: #e9573f; --bg1: #fff0ea; --bg2: #fffaf5; --bd: #f4c8b8; }
    .tiktok { --c: #202020; --bg1: #f2f7f7; --bg2: #ffffff; --bd: #d9e8e8; }
    .email { --c: #d9772f; --bg1: #fff3e6; --bg2: #fffaf2; --bd: #f3d3b5; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(31, 36, 31, 0.42);
      margin-top: 18px;
      padding-bottom: 4px;
    }

    @media (max-width: 390px) {
      .hero {
        padding-left: 18px;
        padding-right: 18px;
      }

      .title {
        font-size: 24px;
      }

      .intro-box {
        font-size: 17px;
        padding: 20px 16px;
      }

      .primary-btn {
        min-height: 54px;
        font-size: 15px;
      }

      .secondary-btn {
        min-height: 50px;
        font-size: 14px;
      }

      .more-panel {
        margin-left: -18px;
        margin-right: -18px;
      }
    }
  </style>
</head>
<body>

  <script>
    const LINE_URL = 'https://line.me/ti/p/-6XfFBLVn6';
    const LINE_ID = 'azaz189189';

    const menuBtn = document.getElementById('menuBtn');
    const drawer = document.getElementById('drawer');
    const shareBtn = document.getElementById('shareBtn');
    const copyLineLinkBtn = document.getElementById('copyLineLinkBtn');

    function openLine(event) {
      if (event) event.preventDefault();

      // TikTok 內置瀏覽器對 target="_blank" 和自動跳轉不穩定；
      // 這裡使用「用戶點擊後，當前頁跳轉」的方式，成功率更高。
      window.location.href = LINE_URL;
    }

    document.querySelectorAll('.js-line-link').forEach((link) => {
      link.setAttribute('href', LINE_URL);
      link.removeAttribute('target');
      link.addEventListener('click', openLine);
    });

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      drawer.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!drawer.contains(e.target) && !menuBtn.contains(e.target)) {
        drawer.classList.remove('open');
      }
    });

    copyLineLinkBtn.addEventListener('click', async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(LINE_URL);
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = LINE_URL;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        alert('LINE 鏈接已複製');
      } catch (err) {
        alert('請手動複製 LINE 鏈接：' + LINE_URL);
      }
    });

    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: document.title,
        text: '歡迎查看我的頁面',
        url: window.location.href
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(window.location.href);
          alert('LINE ID已複製 請前往LINE客戶端添加好友');
        } else {
          alert(window.location.href);
        }
      } catch (err) {
        console.log(err);
      }
    });
  </script>

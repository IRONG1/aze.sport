<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LINE 領取教學</title>
  <style>
    :root {
      --bg: #fffaf2;
      --text: #1f241f;
      --subtext: #6f7568;
      --green: #2fb86f;
      --green-deep: #17894f;
      --green-soft: #e7f6ed;
      --border: rgba(31, 36, 31, 0.08);
      --shadow: 0 14px 32px rgba(45, 91, 59, 0.12);
      --maxw: 430px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--maxw);
      min-height: 100vh;
      background: var(--bg);
      overflow-x: hidden;
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    }

    .topbar {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 10px;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 0;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
    }

    .back-btn:active,
    .copy-btn:active {
      transform: scale(0.985);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 17px;
      font-weight: 800;
      color: var(--green-deep);
      letter-spacing: -0.02em;
    }

    .brand img {
      width: 19px;
      height: 19px;
      object-fit: contain;
      display: block;
    }

    .content {
      padding: 30px 18px 0;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.24;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .desc {
      margin: 10px auto 0;
      max-width: 340px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--subtext);
      font-weight: 600;
    }

    .line-copy-card {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--green-soft);
      border: 1px solid #cfead8;
      border-radius: 18px;
      box-shadow: 0 10px 22px rgba(47, 184, 111, 0.08);
      text-align: left;
    }

    .line-copy-main {
      flex: 1;
      min-width: 0;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: #ffffff;
      border: 1px solid rgba(47, 184, 111, 0.26);
      border-radius: 14px;
    }

    .line-copy-icon {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
    }

    .line-copy-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.15;
    }

    .line-copy-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--green-deep);
      text-transform: uppercase;
    }

    .line-copy-id {
      margin-top: 3px;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      word-break: break-all;
    }

    .copy-btn {
      flex: 0 0 auto;
      min-height: 48px;
      padding: 0 16px;
      border: 0;
      border-radius: 14px;
      background: var(--green-deep);
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 16px rgba(23, 137, 79, 0.16);
    }

    .tip-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffdf8;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px rgba(45, 91, 59, 0.05);
      color: #816545;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 700;
      text-align: left;
    }

    .guide {
      margin-top: 24px;
      text-align: left;
    }

    .guide-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 900;
      color: #48614d;
    }

    .guide-list {
      display: grid;
      gap: 14px;
    }

    .guide-step {
      border-radius: 20px;
      background: #fffdf8;
      border: 1px solid var(--border);
      box-shadow: 0 8px 22px rgba(45, 91, 59, 0.06);
      overflow: hidden;
    }

    .step-head {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 850;
      color: var(--text);
      background: linear-gradient(135deg, #f6efe3 0%, #eaf7ee 100%);
    }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--green-deep);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .step-body {
      padding: 12px;
    }

    .step-text {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--subtext);
      font-weight: 600;
    }

    .img-frame {
      border-radius: 16px;
      overflow: hidden;
      background: #eef4ef;
      border: 1px solid rgba(31, 159, 93, 0.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }

    .img-frame.compact {
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #f6fbf7 0%, #eef7f1 100%);
    }

    .step-img {
      width: 100%;
      height: auto;
      display: block;
      background: #f3eadc;
    }

    .step-img.contain {
      width: auto;
      max-width: 100%;
      max-height: 160px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 6px 14px rgba(24, 70, 42, 0.08);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(31, 36, 31, 0.42);
      margin-top: 24px;
      padding-bottom: 4px;
    }

    @media (max-width: 390px) {
      .content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .title {
        font-size: 23px;
      }

      .line-copy-card {
        gap: 8px;
      }

      .copy-btn {
        padding: 0 14px;
      }

      .step-img.contain {
        max-height: 138px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="back-btn" href="index.html" aria-label="返回">‹</a>
      <div class="brand">
        <img src="line.png" alt="LINE" />
        <span>LINE 領取教學</span>
      </div>
      <div></div>
    </header>

    <main class="content">
      <h1 class="title">領取不成功？<br />請手動添加主播 LINE</h1>
      <p class="desc">點擊複製LINE, 到line私信阿澤領取福利</p>

      <div class="line-copy-card">
        <div class="line-copy-main">
          <img class="line-copy-icon" src="line.png" alt="LINE" />
          <div class="line-copy-text">
            <span class="line-copy-label">LINE ID</span>
            <span class="line-copy-id">azaz189189</span>
          </div>
        </div>
        <button class="copy-btn" id="copyLineIdBtn" type="button">複製LINE</button>
      </div>

      <section class="guide">
        <h2 class="guide-title">領取流程引導</h2>
        <div class="guide-list">
          <div class="guide-step">
            <div class="step-head"><span class="step-num">1</span><span>先在本頁點擊「複製LINE」，然後打開LINE</span></div>
            <div class="step-body">
              <div class="img-frame compact">
                <img class="step-img contain" src="guide-1.png" alt="點擊複製 LINE 按鈕" />
              </div>
            </div>
          </div>

          <div class="guide-step">
            <div class="step-head"><span class="step-num">2</span><span>進入 LINE 之後， 進入首頁，點擊右上角加入好友</span></div>
            <div class="step-body">
              <div class="img-frame">
                <img class="step-img" src="guide-2.png" alt="進入 LINE 後點擊右上角加入好友" />
              </div>
            </div>
          </div>

          <div class="guide-step">
            <div class="step-head"><span class="step-num">3</span><span>在加入好友頁面，點擊「搜尋」</span></div>
            <div class="step-body">
              <div class="img-frame">
                <img class="step-img" src="guide-3.png" alt="在加入好友頁面點擊搜尋" />
              </div>
            </div>
          </div>

          <div class="guide-step">
            <div class="step-head"><span class="step-num">4</span><span>選擇 ID，貼上 azaz189189 並搜尋</span></div>
            <div class="step-body">
              <div class="img-frame">
                <img class="step-img" src="guide-4.png" alt="貼上 LINE ID 並搜尋" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="guide-step">
            <div class="step-head"><span class="step-num">5</span><span>添加阿澤line，私信阿澤領取粉絲福利</span></div>
          </div>
        </div>
      </section>

      <div class="footer">© 2026 Aze</div>
    </main>
  </div>

  <script>
    const LINE_ID = 'azaz189189';
    const copyLineIdBtn = document.getElementById('copyLineIdBtn');

    copyLineIdBtn.addEventListener('click', async () => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(LINE_ID);
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = LINE_ID;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        alert('LINE ID 已複製，請前往 LINE 搜尋添加好友');
      } catch (err) {
        alert('請手動複製 LINE ID：' + LINE_ID);
      }
    });
  </script>
</body>
</html>
